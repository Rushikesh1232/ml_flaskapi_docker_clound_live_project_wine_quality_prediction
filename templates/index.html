<!DOCTYPE html>
<html>
<head>
    
    <title>Wine Quality Prediction</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

    <h2>Wine Quality Prediction</h2>

    <form action="/predict" method="post">

        <input type="text" name="fixed acidity" placeholder="fixed acidity" required><br>
        <input type="text" name="volatile acidity" placeholder="volatile acidity" required><br>
        <input type="text" name="citric acid" placeholder="citric acid" required><br>
        <input type="text" name="residual sugar" placeholder="residual sugar" required><br>
        <input type="text" name="chlorides" placeholder="chlorides" required><br>
        <input type="text" name="free sulfur dioxide" placeholder="free sulfur dioxide" required><br>
        <input type="text" name="total sulfur dioxide" placeholder="total sulfur dioxide" required><br>
        <input type="text" name="density" placeholder="density" required><br>
        <input type="text" name="pH" placeholder="pH" required><br>
        <input type="text" name="sulphates" placeholder="sulphates" required><br>
        <input type="text" name="alcohol" placeholder="alcohol" required><br>

        <button type="submit">Predict</button>

    </form>

    <h3>{{ prediction_text }}</h3>

</body>
</html>
